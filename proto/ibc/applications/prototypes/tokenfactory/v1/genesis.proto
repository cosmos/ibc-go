syntax = "proto3";
package ibc.applications.prototypes.tokenfactory.v1;

import "gogoproto/gogo.proto";
import "ibc/applications/prototypes/tokenfactory/v1/tokenfactory.proto";

option go_package = "github.com/cosmos/ibc-go/v11/modules/apps/prototypes/tokenfactory/types";

// GenesisState defines the tokenfactory module's genesis state.
message GenesisState {
  Params                params         = 1 [(gogoproto.nullable) = false];
  repeated GenesisDenom factory_denoms = 2 [(gogoproto.nullable) = false];
}

// GenesisDenom defines a genesis denom for the tokenfactory module.
message GenesisDenom {
  string                 denom              = 1;
  DenomAuthorityMetadata authority_metadata = 2 [(gogoproto.nullable) = false];
}
