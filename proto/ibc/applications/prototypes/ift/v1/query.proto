syntax = "proto3";
package ibc.applications.prototypes.ift.v1;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "ibc/applications/prototypes/ift/v1/ift.proto";

option go_package = "github.com/cosmos/ibc-go/v11/modules/apps/prototypes/ift/types";

// Query defines the gRPC querier service.
service Query {
  // IFTBridge queries the IFT bridge information for a specific denom and
  // client_id
  rpc IFTBridge(QueryIFTBridgeRequest) returns (QueryIFTBridgeResponse) {
    option (google.api.http).get = "/ibc/applications/prototypes/ift/v1/bridge/{denom}/{client_id}";
  }

  // IFTBridges queries all IFT bridges
  rpc IFTBridges(QueryIFTBridgesRequest) returns (QueryIFTBridgesResponse) {
    option (google.api.http).get = "/ibc/applications/prototypes/ift/v1/bridges";
  }

  // IFTBridgesByDenom queries all IFT bridges for a specific denom
  rpc IFTBridgesByDenom(QueryIFTBridgesByDenomRequest) returns (QueryIFTBridgesByDenomResponse) {
    option (google.api.http).get = "/ibc/applications/prototypes/ift/v1/bridges/{denom}";
  }

  // PendingTransfer queries a pending transfer
  rpc PendingTransfer(QueryPendingTransferRequest) returns (QueryPendingTransferResponse) {
    option (google.api.http).get = "/ibc/applications/prototypes/ift/v1/pending/{denom}/{client_id}/{sequence}";
  }

  // Params queries the module parameters
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/ibc/applications/prototypes/ift/v1/params";
  }
}

// QueryIFTBridgeRequest is the request type for querying an IFT bridge by denom and client ID.
message QueryIFTBridgeRequest {
  string denom     = 1;
  string client_id = 2;
}

// QueryIFTBridgeResponse is the response type for the IFTBridge query.
message QueryIFTBridgeResponse {
  IFTBridge bridge = 1 [(gogoproto.nullable) = false];
}

// QueryIFTBridgesRequest is the request type for querying all IFT bridges.
message QueryIFTBridgesRequest {}

// QueryIFTBridgesResponse is the response type for the IFTBridges query.
message QueryIFTBridgesResponse {
  repeated DenomBridge bridges = 1 [(gogoproto.nullable) = false];
}

// QueryIFTBridgesByDenomRequest is the request type for querying all IFT bridges for a specific denom.
message QueryIFTBridgesByDenomRequest {
  string denom = 1;
}

// QueryIFTBridgesByDenomResponse is the response type for the IFTBridgesByDenom query.
message QueryIFTBridgesByDenomResponse {
  repeated IFTBridge bridges = 1 [(gogoproto.nullable) = false];
}

// QueryPendingTransferRequest is the request type for querying a pending transfer.
message QueryPendingTransferRequest {
  string denom     = 1;
  string client_id = 2;
  uint64 sequence  = 3;
}

// QueryPendingTransferResponse is the response type for the PendingTransfer query.
message QueryPendingTransferResponse {
  PendingTransfer pending_transfer = 1 [(gogoproto.nullable) = false];
}

// QueryParamsRequest is the request type for querying module parameters.
message QueryParamsRequest {}

// QueryParamsResponse is the response type for the Params query.
message QueryParamsResponse {
  Params params = 1 [(gogoproto.nullable) = false];
}

// DenomBridge wraps denom with its bridge info for query responses
message DenomBridge {
  string    denom  = 1;
  IFTBridge bridge = 2 [(gogoproto.nullable) = false];
}
